version: "3.1"
services:
  cart:
    image: cart
    hostname: cart
    build:
      context: .
      dockerfile: ./cart/Dockerfile
    restart: unless-stopped
    environment:
      LOMS_GRPC_ADDR: "loms:50052"
      GRPC_PORT: "50051"
      GRPC_GATEWAY_PORT: "8080"

  loms:
    image: loms
    hostname: loms
    build:
      context: .
      dockerfile: ./loms/Dockerfile
    restart: unless-stopped
    environment:
      GRPC_PORT: "50052"
      GRPC_GATEWAY_PORT: "8081"
